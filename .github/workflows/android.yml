name: Build Android APK & AAB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Binaries
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install NPM Dependencies
      run: npm ci

    - name: Regenerate Gradle Wrapper
      run: |
        cd android
        gradle wrapper --gradle-version 8.14.3

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile React Web Assets
      run: npm run build

    - name: Synchronize web assets with Capacitor
      run: npx cap sync

    - name: Make Gradle Wrapper Executable
      run: chmod +x android/gradlew

    - name: Compile Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Compile Release APK (Unsigned)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Compile Release App Bundle (AAB - Unsigned)
      run: |
        cd android
        ./gradlew bundleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WealthSnap-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Release APK (Unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: WealthSnap-Release-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 7

    - name: Upload Release App Bundle (AAB)
      uses: actions/upload-artifact@v4
      with:
        name: WealthSnap-Release-AAB
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
